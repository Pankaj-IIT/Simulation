<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PCMVerse Shorts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background: #0a0a1a;
        }
        
        .shorts-container {
            width: 100%;
            height: 100dvh;
            max-width: 427px;
            margin: 0 auto;
            position: relative;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        .sim-iframe {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="shorts-container" id="shortsContainer">
        <iframe class="sim-iframe" id="simIframe" src="" allowfullscreen sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
    </div>
    
    <script src="js/obfuscated/shorts-inline.js"></script>
</body>
</html>
