<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rydberg Equation - Pankaj Classes</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .navbar-sim {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-sim .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .navbar-sim .site-logo {
            height: 40px;
            width: auto;
            filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.3));
        }
        .navbar-sim .logo-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .navbar-sim .logo-text h1 {
            font-size: 1.1rem;
            margin: 0;
            background: linear-gradient(135deg, var(--physics-color), var(--primary), var(--chemistry-color), var(--maths-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            line-height: 1.2;
        }
        .navbar-sim .nav-center {
            flex: 1;
            text-align: center;
        }
        .navbar-sim .nav-center h1 {
            font-size: 1.3rem;
            margin: 0;
            background: linear-gradient(135deg, #ffffff, #cccccc, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-sim .back-btn {
            margin: 0;
            padding: 0.5rem 1rem;
            text-align: center;
            flex-shrink: 0;
        }
        .sim-page { padding: 0; height: calc(100vh - 70px); display: flex; flex-direction: column; }
        .sim-container { display: flex; flex: 1; gap: 0; overflow: hidden; }
        .sim-container > div:first-child { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .canvas-wrapper { flex: 1; margin: 0.5rem; margin-bottom: 0.3rem; border-radius: var(--radius); overflow: hidden; }
        .canvas-wrapper canvas { width: 100%; height: 100%; display: block; }
        .controls-panel { width: 260px; max-height: none; overflow-y: auto; margin: 0.5rem 0.5rem 0.5rem 0.3rem; padding: 0.8rem; border-radius: var(--radius); }
        .controls-panel h3 { margin-bottom: 1rem; font-size: 1rem; }
        .control-group { margin-bottom: 1rem; }
        .control-group label { font-size: 0.8rem; display: block; margin-bottom: 4px; }
        .control-group select { width: 100%; padding: 0.4rem; background: #2d3436; color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; font-size: 0.85rem; }
        .info-box { font-size: 0.75rem; margin-top: 1rem; padding: 0.7rem; background: rgba(255,255,255,0.03); border-radius: 6px; }
        
        .series-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 1rem;
        }
        .series-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .series-btn:hover {
            background: #6c5ce7;
            border-color: #6c5ce7;
        }
        .action-btn {
            width: 100%;
            padding: 0.6rem;
            background: #00b894;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .action-btn:hover {
            background: #00a884;
        }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5SCFHT9W3K"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-sim">
            <img src="../assets/logo.png" alt="Logo" class="site-logo">
            <div class="logo-text"><h1>Pankaj Classes</h1></div>
            <div class="nav-center"><h1>Rydberg Equation</h1></div>
            <button class="back-btn" onclick="window.location.href='../index.html#chemistry'">Back to Chemistry</button>
        </nav>
    </header>
    <main class="sim-page">
        <div class="sim-container">
            <div>
                <div class="canvas-wrapper">
                    <canvas id="simCanvas" width="900" height="520"></canvas>
                </div>
            </div>
            <div class="controls-panel">
                <h3>Controls</h3>
                
                <label style="font-size: 0.8rem; margin-bottom: 6px; display: block; font-weight: bold; color: #a855f7;">Jump to Series</label>
                <div class="series-grid">
                    <button class="series-btn" onclick="applySeriesPreset(1, 3)">Lyman</button>
                    <button class="series-btn" onclick="applySeriesPreset(2, 4)">Balmer</button>
                    <button class="series-btn" onclick="applySeriesPreset(3, 5)">Paschen</button>
                    <button class="series-btn" onclick="applySeriesPreset(4, 6)">Brackett</button>
                </div>

                <div class="control-group">
                    <label id="seriesLabel" style="font-weight: bold; color: #fdcb6e; font-size: 0.85rem; margin-bottom: 8px;">Active: Balmer Series</label>
                    <label for="n1Select">Desired Lower State (n₁)</label>
                    <select id="n1Select" onchange="handleN1Change(parseInt(this.value))">
                        <option value="1">n = 1 (Lyman Series)</option>
                        <option value="2" selected>n = 2 (Balmer Series)</option>
                        <option value="3">n = 3 (Paschen Series)</option>
                        <option value="4">n = 4 (Brackett Series)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="n2Select">Selected Transition Origin (n₂)</label>
                    <select id="n2Select" onchange="handleN2Change(parseInt(this.value))">
                        </select>
                </div>

                <button class="action-btn" onclick="triggerTransitionAnimation()">Simulate Drop Transition</button>

                <div class="info-box" style="background: rgba(108, 92, 231, 0.08); border: 1px solid rgba(108, 92, 231, 0.25);">
                    <strong>Quantum Output Matrix:</strong><br>
                    <p style="margin: 6px 0 3px 0; font-family: monospace; font-size: 0.78rem; color: #55efc4;" id="mathWave">
                        Wavelength (λ): 486.1 nm
                    </p>
                    <p style="margin: 0; font-family: monospace; font-size: 0.75rem; color: rgba(255,255,255,0.6);" id="mathDomain">
                        Domain: Visible Light
                    </p>
                </div>

                <div class="info-box">
                    <strong>Dual-Viewport Guide:</strong><br>
                    <p style="margin: 4px 0 0 0; line-height: 1.4;">
                        <strong>Left:</strong> Bohr circular tracks show the orbital jump.<br>
                        <strong>Right:</strong> Parallel straight levels showcase the specific transitions layout matching your textbook chart.
                    </p>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/obfuscated/chemistry/rydberg-equation-inline.js"></script>

    <script src="../js/obfuscated/chemistry/rydberg-equation-inline1.js"></script>
            </body>
</html>
