<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Shapes - Pankaj Classes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .navbar-sim {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-sim .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .navbar-sim .site-logo {
            height: 40px;
            width: auto;
            filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.3));
        }
        .navbar-sim .logo-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .navbar-sim .logo-text h1 {
            font-size: 1.1rem;
            margin: 0;
            background: linear-gradient(135deg, var(--physics-color), var(--primary), var(--chemistry-color), var(--maths-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            line-height: 1.2;
        }
        .navbar-sim .nav-center {
            flex: 1;
            text-align: center;
        }
        .navbar-sim .nav-center h1 {
            font-size: 1.3rem;
            margin: 0;
            background: linear-gradient(135deg, #ffffff, #cccccc, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-sim .back-btn {
            margin: 0;
            padding: 0.5rem 1rem;
            text-align: center;
            flex-shrink: 0;
        }
        .sim-page { padding: 0; height: calc(100vh - 70px); display: flex; flex-direction: column; }
        .sim-container { display: flex; flex: 1; gap: 0; overflow: hidden; }
        .sim-container > div:first-child { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .canvas-wrapper { flex: 1; margin: 0.5rem; margin-bottom: 0.3rem; border-radius: var(--radius); overflow: hidden; }
        .canvas-wrapper canvas { width: 100%; height: 100%; display: block; }
        .controls-panel { width: 260px; max-height: none; overflow-y: auto; margin: 0.5rem 0.5rem 0.5rem 0.3rem; padding: 0.8rem; border-radius: var(--radius); }
        .controls-panel h3 { margin-bottom: 1rem; font-size: 1rem; }
        .control-group { margin-bottom: 1rem; }
        .control-group label { font-size: 0.8rem; }
        .control-group input[type="range"] { height: 4px; }
        .control-group input[type="range"]::-webkit-slider-thumb { width: 14px; height: 14px; }
        .info-box { font-size: 0.75rem; margin-top: 1rem; padding: 0.7rem; background: rgba(255,255,255,0.03); border-radius: 6px; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5SCFHT9W3K"></script>
</head>
<body>
    <header>
        <nav class="navbar navbar-sim">
            <img src="../assets/logo.png" alt="Logo" class="site-logo">
            <div class="logo-text"><h1>Pankaj Classes</h1></div>
            <div class="nav-center"><h1>Orbital Shapes</h1></div>
            <button class="back-btn" onclick="window.location.href='../index.html#chemistry'">Back to Chemistry</button>
        </nav>
    </header>
    <main class="sim-page">
        <div class="sim-container">
            <div>
                <div class="canvas-wrapper"><canvas id="simCanvas" width="800" height="500"></canvas></div>
            </div>
            <div class="controls-panel">
                <h3>Controls</h3>
                <div class="control-group"><label>Principal Quantum (n): <span class="value" id="nVal">2</span></label><input type="range" id="nSlider" min="1" max="5" value="2" step="1"></div>
                <div class="control-group"><label>Orbital Type (l): <select id="orbitalType" style="width:100%;padding:0.5rem;background:var(--border-color);color:#fff;border:none;border-radius:6px;"><option value="s">s orbital (l=0)</option><option value="p">p orbital (l=1)</option><option value="d">d orbital (l=2)</option><option value="f">f orbital (l=3)</option></select></label></div>
                
                <div class="control-group" id="orientationWrapper">
                    <label>Orientation (mₗ): 
                        <select id="orbitalOrientation" style="width:100%;padding:0.5rem;background:rgba(255,255,255,0.05);color:#fff;border:none;border-radius:6px;margin-top:0.3rem;"></select>
                    </label>
                </div>

                <div class="control-group"><label>Rotation Speed: <span class="value" id="rotSpeedVal">30</span></label><input type="range" id="rotSpeed" min="0" max="100" value="30"></div>
                <div class="control-group"><label>Show Nodes: <input type="checkbox" id="showNodes" checked></label></div>
                <div class="control-group"><label>Show Axes: <input type="checkbox" id="showAxes" checked></label></div>
                <div class="control-group"><label>Opacity: <span class="value" id="opacityVal">60</span></label><input type="range" id="opacity" min="10" max="100" value="60"></div>
                <div class="sim-buttons"><button class="sim-btn primary" id="resetBtn">Reset</button></div>
                <div class="info-box">
                    <strong>Atomic Orbitals View Guide:</strong><br>
                    • Opacity 60% - 100%: Shows full solid orbital shape.<br>
                    • Opacity under 60%: Opens cross-section to see internal orange nodes!
                </div>
            </div>
        </div>
    </main>
    <script src="../js/sim-common.js"></script>
    <script src="../js/obfuscated/chemistry/orbital-shapes-inline.js"></script>
</body>
</html>
