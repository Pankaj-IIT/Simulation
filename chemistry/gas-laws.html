<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Laws - Pankaj Classes</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .stats-panel {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); padding: 1rem; margin-top: 1rem;
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
        }
        .stat-item { display: flex; justify-content: space-between; font-size: 0.85rem; }
        .stat-item .label { color: var(--text-secondary); }
        .stat-item .val { color: var(--chemistry-color); font-weight: 600; font-family: 'Courier New', monospace; }
        .law-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .law-tab {
            flex: 1; padding: 0.6rem; background: var(--border-color);
            border: 1px solid transparent; color: var(--text-primary);
            border-radius: 6px; cursor: pointer; font-size: 0.85rem; text-align: center;
        }
        .law-tab.active { border-color: var(--chemistry-color); background: rgba(255,255,255,0.1); }
        .navbar-sim {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-sim .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .navbar-sim .site-logo {
            height: 40px;
            width: auto;
            filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.3));
        }
        .navbar-sim .logo-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .navbar-sim .logo-text h1 {
            font-size: 1.1rem;
            margin: 0;
            background: linear-gradient(135deg, var(--physics-color), var(--primary), var(--chemistry-color), var(--maths-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            line-height: 1.2;
        }
        .navbar-sim .nav-center {
            flex: 1;
            text-align: center;
        }
        .navbar-sim .nav-center h1 {
            font-size: 1.3rem;
            margin: 0;
            background: linear-gradient(135deg, #ffffff, #cccccc, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-sim .back-btn {
            margin: 0;
            padding: 0.5rem 1rem;
            text-align: center;
            flex-shrink: 0;
        }
        .sim-page { padding: 0; height: calc(100vh - 70px); display: flex; flex-direction: column; }
        .sim-container { display: flex; flex: 1; gap: 0; overflow: hidden; }
        .sim-container > div:first-child { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .canvas-wrapper { flex: 1; margin: 1rem; margin-bottom: 0.5rem; border-radius: var(--radius); overflow: hidden; }
        .canvas-wrapper canvas { width: 100%; height: 100%; display: block; }
        .stats-panel { margin: 0 1rem 1rem 1rem; padding: 0.7rem; font-size: 0.8rem; }
        .stats-panel .stat-item { padding: 0.2rem 0; }
        .controls-panel { width: 300px; max-height: none; overflow-y: auto; margin: 1rem 1rem 1rem 0.5rem; padding: 1.2rem; border-radius: var(--radius); }
        .controls-panel h3 { margin-bottom: 1rem; font-size: 1rem; }
        .control-group { margin-bottom: 1rem; }
        .control-group label { font-size: 0.8rem; }
        .control-group input[type="range"] { height: 4px; }
        .control-group input[type="range"]::-webkit-slider-thumb { width: 14px; height: 14px; }
        .info-box { font-size: 0.75rem; margin-top: 1rem; padding: 0.7rem; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5SCFHT9W3K"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-sim">
            <img src="../assets/logo.png" alt="Logo" class="site-logo">

            <div class="logo-text"><h1>Pankaj Classes</h1></div>
            <div class="nav-center"><h1>Gas Laws</h1></div>
            <button class="back-btn" onclick="window.location.href='../index.html#chemistry'">Back to Chemistry</button>
        </nav>
    </header>
    <main class="sim-page">
        <div class="sim-container">
            <div>
                <div class="law-tabs">
                    <button class="law-tab active" data-law="boyle">Boyle's Law</button>
                    <button class="law-tab" data-law="charles">Charles's Law</button>
                    <button class="law-tab" data-law="ideal">Ideal Gas Law</button>
                </div>
                <div class="canvas-wrapper"><canvas id="simCanvas" width="800" height="400"></canvas></div>
                <div class="stats-panel">
                    <div class="stat-item"><span class="label">Pressure:</span><span class="val" id="statP">1.00 atm</span></div>
                    <div class="stat-item"><span class="label">Volume:</span><span class="val" id="statV">24.5 L</span></div>
                    <div class="stat-item"><span class="label">Temperature:</span><span class="val" id="statT">298 K</span></div>
                    <div class="stat-item"><span class="label">Moles:</span><span class="val" id="statN">1.00 mol</span></div>
                </div>
            </div>
            <div class="controls-panel">
                <h3 id="lawTitle">Boyle's Law (P\u2081V\u2081 = P\u2082V\u2082)</h3>
                <div id="controls1">
                    <div class="control-group"><label>Volume: <span class="value" id="volVal">24.5 L</span></label><input type="range" id="volume" min="1" max="50" value="24.5" step="0.5"></div>
                </div>
                <div id="controls2" style="display:none">
                    <div class="control-group"><label>Temperature: <span class="value" id="tempVal">298 K</span></label><input type="range" id="temperature" min="100" max="1000" value="298" step="10"></div>
                </div>
                <div id="controls3" style="display:none">
                    <div class="control-group"><label>Pressure: <span class="value" id="pressVal1">1.00 atm</span></label><input type="range" id="pressure" min="0.1" max="10" value="1" step="0.1"></div>
                    <div class="control-group"><label>Volume: <span class="value" id="volVal2">24.5 L</span></label><input type="range" id="volume2" min="1" max="50" value="24.5" step="0.5"></div>
                    <div class="control-group"><label>Temperature: <span class="value" id="tempVal2">298 K</span></label><input type="range" id="temperature2" min="100" max="1000" value="298" step="10"></div>
                    <div class="control-group"><label>Moles: <span class="value" id="molesVal">1.00 mol</span></label><input type="range" id="moles" min="0.1" max="5" value="1" step="0.1"></div>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/obfuscated/chemistry/gas-laws-inline.js"></script>
    <script src="../js/obfuscated/chemistry/gas-laws-inline.js"></script>            </body>
</html>
