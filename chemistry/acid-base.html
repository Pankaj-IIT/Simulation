<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acid-Base Chemistry - Pankaj Classes</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .stats-panel {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); padding: 1rem; margin-top: 1rem;
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
        }
        .stat-item { display: flex; justify-content: space-between; font-size: 0.85rem; }
        .stat-item .label { color: var(--text-secondary); }
        .stat-item .val { color: var(--chemistry-color); font-weight: 600; font-family: 'Courier New', monospace; }
        .ph-display {
            background: var(--bg-card); border: 2px solid var(--border-color);
            border-radius: var(--radius); padding: 1.5rem; text-align: center;
            margin-bottom: 1rem;
        }
        .ph-value { font-size: 4rem; font-weight: 800; }
        .ph-label { font-size: 0.9rem; color: var(--text-secondary); }
        .indicator-bar {
            height: 20px; border-radius: 10px; margin-top: 0.5rem;
            background: linear-gradient(to right, #ffffff, #ff8800, #ffff00, #00ff00, #0088ff, #0000ff, #8800ff);
        }
        .navbar-sim {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-sim .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .navbar-sim .site-logo {
            height: 40px;
            width: auto;
            filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.3));
        }
        .navbar-sim .logo-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .navbar-sim .logo-text h1 {
            font-size: 1.1rem;
            margin: 0;
            background: linear-gradient(135deg, var(--physics-color), var(--primary), var(--chemistry-color), var(--maths-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            line-height: 1.2;
        }
        .navbar-sim .nav-center {
            flex: 1;
            text-align: center;
        }
        .navbar-sim .nav-center h1 {
            font-size: 1.3rem;
            margin: 0;
            background: linear-gradient(135deg, #ffffff, #cccccc, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-sim .back-btn {
            margin: 0;
            padding: 0.5rem 1rem;
            text-align: center;
            flex-shrink: 0;
        }
        .sim-page { padding: 0; height: calc(100vh - 70px); display: flex; flex-direction: column; }
        .sim-container { display: flex; flex: 1; gap: 0; overflow: hidden; }
        .sim-container > div:first-child { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .canvas-wrapper { flex: 1; margin: 1rem; margin-bottom: 0.5rem; border-radius: var(--radius); overflow: hidden; }
        .canvas-wrapper canvas { width: 100%; height: 100%; display: block; }
        .stats-panel { margin: 0 1rem 1rem 1rem; padding: 0.7rem; font-size: 0.8rem; }
        .stats-panel .stat-item { padding: 0.2rem 0; }
        .controls-panel { width: 300px; max-height: none; overflow-y: auto; margin: 1rem 1rem 1rem 0.5rem; padding: 1.2rem; border-radius: var(--radius); }
        .controls-panel h3 { margin-bottom: 1rem; font-size: 1rem; }
        .control-group { margin-bottom: 1rem; }
        .control-group label { font-size: 0.8rem; }
        .control-group input[type="range"] { height: 4px; }
        .control-group input[type="range"]::-webkit-slider-thumb { width: 14px; height: 14px; }
        .info-box { font-size: 0.75rem; margin-top: 1rem; padding: 0.7rem; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5SCFHT9W3K"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-sim">
            <img src="../assets/logo.png" alt="Logo" class="site-logo">

            <div class="logo-text"><h1>Pankaj Classes</h1></div>
            <div class="nav-center"><h1>Acid-Base Chemistry</h1></div>
            <button class="back-btn" onclick="window.location.href='../index.html#chemistry'">Back to Chemistry</button>
        </nav>
    </header>
    <main class="sim-page">
        <div class="sim-container">
            <div>
                <div class="ph-display">
                    <div class="ph-label">Current pH</div>
                    <div class="ph-value" id="phValue" style="color: #ff6b6b;">7.00</div>
                    <div class="indicator-bar"></div>
                    <div style="display:flex; justify-content:space-between; margin-top:5px;">
                        <span style="font-size:0.7rem; color:var(--text-secondary)">Acidic</span>
                        <span style="font-size:0.7rem; color:var(--text-secondary)">Neutral</span>
                        <span style="font-size:0.7rem; color:var(--text-secondary)">Basic</span>
                    </div>
                </div>
                <div class="canvas-wrapper"><canvas id="simCanvas" width="800" height="350"></canvas></div>
                <div class="stats-panel">
                    <div class="stat-item"><span class="label">[H\u207a]:</span><span class="val" id="statH">1.00\u00d710\u207b\u00b7M</span></div>
                    <div class="stat-item"><span class="label">[OH\u207b]:</span><span class="val" id="statOH">1.00\u00d710\u207b\u00b7M</span></div>
                    <div class="stat-item"><span class="label">pOH:</span><span class="val" id="statPOH">7.00</span></div>
                    <div class="stat-item"><span class="label">Titration Vol:</span><span class="val" id="statVol">0.0 mL</span></div>
                </div>
            </div>
            <div class="controls-panel">
                <h3>Titration Controls</h3>
                <div class="control-group"><label>Acid Type:</label>
                    <select id="acidType" style="width:100%;padding:0.5rem;background:var(--border-color);color:#fff;border:none;border-radius:6px;">
                        <option value="strong">Strong Acid (HCl)</option>
                        <option value="weak">Weak Acid (CH\u2083COOH)</option>
                    </select>
                </div>
                <div class="control-group"><label>Acid Concentration: <span class="value" id="acidConcVal">0.1 M</span></label><input type="range" id="acidConc" min="0.01" max="1" value="0.1" step="0.01"></div>
                <div class="control-group"><label>Acid Volume: <span class="value" id="acidVolVal">50 mL</span></label><input type="range" id="acidVol" min="10" max="100" value="50" step="5"></div>
                <div class="control-group"><label>Base Concentration: <span class="value" id="baseConcVal">0.1 M</span></label><input type="range" id="baseConc" min="0.01" max="1" value="0.1" step="0.01"></div>
                <div class="control-group"><label>Titrant Added: <span class="value" id="titrantVal">0 mL</span></label><input type="range" id="titrant" min="0" max="120" value="0" step="1"></div>
                <div class="sim-buttons"><button class="sim-btn primary" id="resetBtn">Reset Titration</button></div>
            </div>
        </div>
    </main>
    <script src="../js/obfuscated/chemistry/acid-base-inline.js"></script>
    <script src="../js/obfuscated/chemistry/acid-base-inline.js"></script>            </body>
</html>
