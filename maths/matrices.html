<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Transformations - Pankaj Classes</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .stats-panel {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); padding: 1rem; margin-top: 1rem;
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
        }
        .stat-item { display: flex; justify-content: space-between; font-size: 0.85rem; }
        .stat-item .label { color: var(--text-secondary); }
        .stat-item .val { color: var(--maths-color); font-weight: 600; font-family: 'Courier New', monospace; }
        .matrix-display {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; padding: 1rem; text-align: center; margin-bottom: 1rem;
        }
        .matrix-grid {
            display: inline-grid; grid-template-columns: 1fr 1fr; gap: 4px;
            background: #fdcb6e; padding: 4px; border-radius: 4px; margin: 0 10px;
        }
        .matrix-cell {
            width: 50px; height: 30px; background: var(--bg-dark);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Courier New', monospace; font-weight: 700; font-size: 14px;
        }
        .navbar-sim {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-sim .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .navbar-sim .site-logo {
            height: 40px;
            width: auto;
            filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.3));
        }
        .navbar-sim .logo-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .navbar-sim .logo-text h1 {
            font-size: 1.1rem;
            margin: 0;
            background: linear-gradient(135deg, var(--physics-color), var(--primary), var(--chemistry-color), var(--maths-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            line-height: 1.2;
        }
        .navbar-sim .nav-center {
            flex: 1;
            text-align: center;
        }
        .navbar-sim .nav-center h1 {
            font-size: 1.3rem;
            margin: 0;
            background: linear-gradient(135deg, #ffffff, #cccccc, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-sim .back-btn {
            margin: 0;
            padding: 0.5rem 1rem;
            text-align: center;
            flex-shrink: 0;
        }
        .sim-page { padding: 0; height: calc(100vh - 70px); display: flex; flex-direction: column; }
        .sim-container { display: flex; flex: 1; gap: 0; overflow: hidden; }
        .sim-container > div:first-child { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .canvas-wrapper { flex: 1; margin: 1rem; margin-bottom: 0.5rem; border-radius: var(--radius); overflow: hidden; }
        .canvas-wrapper canvas { width: 100%; height: 100%; display: block; }
        .stats-panel { margin: 0 1rem 1rem 1rem; padding: 0.7rem; font-size: 0.8rem; }
        .stats-panel .stat-item { padding: 0.2rem 0; }
        .controls-panel { width: 300px; max-height: none; overflow-y: auto; margin: 1rem 1rem 1rem 0.5rem; padding: 1.2rem; border-radius: var(--radius); }
        .controls-panel h3 { margin-bottom: 1rem; font-size: 1rem; }
        .control-group { margin-bottom: 1rem; }
        .control-group label { font-size: 0.8rem; }
        .control-group input[type="range"] { height: 4px; }
        .control-group input[type="range"]::-webkit-slider-thumb { width: 14px; height: 14px; }
        .info-box { font-size: 0.75rem; margin-top: 1rem; padding: 0.7rem; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5SCFHT9W3K"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-sim">
            <img src="../assets/logo.png" alt="Logo" class="site-logo">

            <div class="logo-text"><h1>Pankaj Classes</h1></div>
            <div class="nav-center"><h1>Matrices</h1></div>
            <button class="back-btn" onclick="window.location.href='../index.html'">Back to Maths</button>
        </nav>
    </header>
    <main class="sim-page">
        <div class="sim-container">
            <div>
                <div class="matrix-display">
                    Transformation Matrix:
                    <div class="matrix-grid">
                        <div class="matrix-cell" id="m11">1</div>
                        <div class="matrix-cell" id="m12">0</div>
                        <div class="matrix-cell" id="m21">0</div>
                        <div class="matrix-cell" id="m22">1</div>
                    </div>
                    <div style="margin-top:0.5rem; font-size:0.9rem; color:var(--text-secondary);" id="transformType">Identity (No transformation)</div>
                </div>
                <div class="canvas-wrapper"><canvas id="simCanvas" width="800" height="500"></canvas></div>
                <div class="stats-panel">
                    <div class="stat-item"><span class="label">Determinant:</span><span class="val" id="statDet">1.000</span></div>
                    <div class="stat-item"><span class="label">Area Scale:</span><span class="val" id="statArea">1.00x</span></div>
                    <div class="stat-item"><span class="label">Rotation:</span><span class="val" id="statRot">0\u00b0</span></div>
                    <div class="stat-item"><span class="label">Singular:</span><span class="val" id="statSingular">No</span></div>
                </div>
            </div>
            <div class="controls-panel">
                <h3>Presets</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-bottom:1rem;">
                    <button class="sim-btn secondary" data-preset="identity">Identity</button>
                    <button class="sim-btn secondary" data-preset="rotate">Rotate 45\u00b0</button>
                    <button class="sim-btn secondary" data-preset="scale">Scale 2x</button>
                    <button class="sim-btn secondary" data-preset="shear">Shear X</button>
                    <button class="sim-btn secondary" data-preset="reflect">Reflect X</button>
                    <button class="sim-btn secondary" data-preset="rotate90">Rotate 90\u00b0</button>
                </div>
                <h3>Custom Matrix</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;">
                    <div class="control-group"><label>a: <span class="value" id="aVal">1.0</span></label><input type="range" id="mA" min="-3" max="3" value="1" step="0.1"></div>
                    <div class="control-group"><label>b: <span class="value" id="bVal">0.0</span></label><input type="range" id="mB" min="-3" max="3" value="0" step="0.1"></div>
                    <div class="control-group"><label>c: <span class="value" id="cVal">0.0</span></label><input type="range" id="mC" min="-3" max="3" value="0" step="0.1"></div>
                    <div class="control-group"><label>d: <span class="value" id="dVal">1.0</span></label><input type="range" id="mD" min="-3" max="3" value="1" step="0.1"></div>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/obfuscated/maths/matrices-inline.js"></script>
    <script src="../js/obfuscated/maths/matrices-inline.js"></script>            </body>
</html>
