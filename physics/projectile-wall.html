<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectile with Wall Collision - Pankaj Classes</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .navbar-sim { display: flex; justify-content: space-between; align-items: center; }
        .navbar-sim .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .navbar-sim .site-logo { height: 40px; width: auto; filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.3)); }
        .navbar-sim .logo-text { display: flex; flex-direction: column; align-items: flex-start; }
        .navbar-sim .logo-text h1 { font-size: 1.1rem; margin: 0; background: linear-gradient(135deg, var(--physics-color), var(--primary), var(--chemistry-color), var(--maths-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 800; line-height: 1.2; }
        .navbar-sim .nav-center { flex: 1; text-align: center; }
        .navbar-sim .nav-center h1 { font-size: 1.3rem; margin: 0; background: linear-gradient(135deg, #ffffff, #cccccc, #fdcb6e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .navbar-sim .back-btn { margin: 0; padding: 0.5rem 1rem; text-align: center; flex-shrink: 0; }
        .sim-page { padding: 0; height: calc(100vh - 70px); display: flex; flex-direction: column; }
        .sim-container { display: flex; flex: 1; gap: 0; overflow: hidden; }
        .sim-container > div:first-child { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .canvas-wrapper { flex: 1; margin: 1rem 1rem 0.5rem 1rem; border-radius: var(--radius); overflow: hidden; }
        .canvas-wrapper canvas { width: 100%; height: 100%; display: block; }
        .controls-panel { width: 300px; max-height: none; overflow-y: auto; margin: 1rem 1rem 1rem 0.5rem; padding: 1.2rem; border-radius: var(--radius); }
        .controls-panel h3 { margin-bottom: 1rem; font-size: 1rem; }
        .control-group { margin-bottom: 1rem; }
        .control-group label { font-size: 0.8rem; }
        .control-group input[type="range"] { height: 4px; }
        .control-group input[type="range"]::-webkit-slider-thumb { width: 14px; height: 14px; }
        .pause-btn { background: #fdcb6e; color: #000000; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: opacity 0.3s; }
        .pause-btn:hover { opacity: 0.85; }
        .cor-info {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-sm);
            padding: 0.8rem;
            margin-top: 0.8rem;
            font-size: 0.8rem;
            color: #fdcb6e;
        }
        .cor-info .title { font-weight: 600; margin-bottom: 0.3rem; }
        .cor-info .detail { display: flex; justify-content: space-between; margin: 0.2rem 0; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5SCFHT9W3K"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-sim">
            <img src="../assets/logo.png" alt="Logo" class="site-logo">

            <div class="logo-text"><h1>Pankaj Classes</h1></div>
            <div class="nav-center"><h1>Projectile with Wall Collision</h1></div>
            <button class="back-btn" onclick="window.location.href='../index.html#physics'">Back to Physics</button>
        </nav>
    </header>
    <main class="sim-page">
        <div class="sim-container">
            <div>
                <div class="canvas-wrapper"><canvas id="simCanvas" width="800" height="500"></canvas></div>
            </div>
            <div class="controls-panel">
                <h3>Controls</h3>
                <div class="control-group"><label>Launch Angle: <span class="value" id="angleVal">45°</span></label><input type="range" id="angle" min="5" max="85" value="45" step="1"></div>
                <div class="control-group"><label>Initial Velocity: <span class="value" id="velVal">30 m/s</span></label><input type="range" id="velocity" min="5" max="60" value="30" step="1"></div>
                <div class="control-group"><label>Wall Distance: <span class="value" id="wallVal">50 m</span></label><input type="range" id="wall" min="10" max="200" value="50" step="1"></div>
                <div class="control-group"><label>Wall Height: <span class="value" id="wallHVal">20 m</span></label><input type="range" id="wallH" min="5" max="50" value="20" step="1"></div>
                <div class="control-group"><label>Gravity: <span class="value" id="gravVal">9.8 m/s˛</span></label><input type="range" id="gravity" min="1" max="20" value="9.8" step="0.1"></div>
                <div class="control-group"><label>Coefficient of Restitution (e): <span class="value" id="corVal">0.8</span></label><input type="range" id="cor" min="0" max="1" value="0.8" step="0.05"></div>
                <div class="cor-info" id="corInfo">
                    <div class="title">Collision Type</div>
                    <div class="detail"><span>Type:</span><span id="corType">-</span></div>
                    <div class="detail"><span>Energy retained:</span><span id="corEnergy">-</span></div>
                </div>
                <div class="sim-buttons" style="margin-top: 1rem;">
                    <button class="sim-btn primary" id="launchBtn">Launch</button>
                    <button class="pause-btn" id="pauseBtn" style="display:none;">Pause</button>
                    <button class="sim-btn secondary" id="resetBtn">Reset</button>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/obfuscated/physics/projectile-wall-inline.js"></script>
    <script src="../js/obfuscated/physics/projectile-wall-inline.js"></script>            </body>
</html>
