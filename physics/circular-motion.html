<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Motion - Pankaj Classes</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .stats-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 1rem;
            margin-top: 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        .stat-item .label {
            color: var(--text-secondary);
        }
        .stat-item .val {
            color: var(--chemistry-color);
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }
        .vector-toggle {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .vector-toggle label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .vector-toggle input {
            accent-color: var(--chemistry-color);
        }

        .navbar-sim {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-sim .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .navbar-sim .site-logo {
            height: 40px;
            width: auto;
            filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.3));
        }
        .navbar-sim .logo-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .navbar-sim .logo-text h1 {
            font-size: 1.1rem;
            margin: 0;
            background: linear-gradient(135deg, var(--physics-color), var(--primary), var(--chemistry-color), var(--maths-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            line-height: 1.2;
        }
        .navbar-sim .nav-center {
            flex: 1;
            text-align: center;
        }
        .navbar-sim .nav-center h1 {
            font-size: 1.3rem;
            margin: 0;
            background: linear-gradient(135deg, #ffffff, #cccccc, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-sim .back-btn {
            margin: 0;
            padding: 0.5rem 1rem;
            text-align: center;
            flex-shrink: 0;
        }
        .sim-page {
            padding: 0;
            height: calc(100vh - 70px);
            display: flex;
            flex-direction: column;
        }
        .sim-container {
            display: flex;
            flex: 1;
            gap: 0;
            overflow: hidden;
        }
        .sim-container > div:first-child {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .canvas-wrapper {
            flex: 1;
            margin: 1rem;
            margin-bottom: 0.5rem;
            border-radius: var(--radius);
            overflow: hidden;
        }
        .canvas-wrapper canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .stats-panel {
            margin: 0 1rem 1rem 1rem;
            padding: 0.7rem;
            font-size: 0.8rem;
        }
        .stats-panel .stat-item {
            padding: 0.2rem 0;
        }
        .controls-panel {
            width: 300px;
            max-height: none;
            overflow-y: auto;
            margin: 1rem 1rem 1rem 0.5rem;
            padding: 1.2rem;
            border-radius: var(--radius);
        }
        .controls-panel h3 {
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        .control-group {
            margin-bottom: 1rem;
        }
        .control-group label {
            font-size: 0.8rem;
        }
        .control-group input[type="range"] {
            height: 4px;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            width: 14px;
            height: 14px;
        }
        .info-box {
            font-size: 0.75rem;
            margin-top: 1rem;
            padding: 0.7rem;
        }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5SCFHT9W3K"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-sim">
            <img src="../assets/logo.png" alt="Logo" class="site-logo">

            <div class="logo-text"><h1>Pankaj Classes</h1></div>
            <button class="navbar-back-btn visible" onclick="window.location.href='../index.html#physics'">Back to Subjects</button>
            <div class="nav-center"><h1>Circular Motion</h1></div>
            <button class="back-btn" onclick="window.location.href='../index.html#physics'">Back to Physics</button>
        </nav>
    </header>
    <main class="sim-page">
        <div class="sim-container">
            <div>
                <div class="canvas-wrapper">
                    <canvas id="simCanvas" width="800" height="500"></canvas>
                </div>
                <div class="stats-panel">
                    <div class="stat-item">
                        <span class="label">Angular Velocity:</span>
                        <span class="val" id="statOmega">0.00 rad/s</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Linear Velocity:</span>
                        <span class="val" id="statV">0.00 m/s</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Centripetal Accel:</span>
                        <span class="val" id="statA">0.00 m/s˛</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Period:</span>
                        <span class="val" id="statT">0.00 s</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Angle:</span>
                        <span class="val" id="statAngle">0.0°</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Frequency:</span>
                        <span class="val" id="statFreq">0.00 Hz</span>
                    </div>
                </div>
            </div>

            <div class="controls-panel">
                <h3>Controls</h3>

                <div class="control-group">
                    <label>Radius: <span class="value" id="radiusVal">2.0 m</span></label>
                    <input type="range" id="radius" min="0.5" max="5" value="2" step="0.1">
                </div>

                <div class="control-group">
                    <label>Angular Velocity: <span class="value" id="omegaVal">3.0 rad/s</span></label>
                    <input type="range" id="omega" min="0.5" max="10" value="3" step="0.1">
                </div>

                <div class="control-group">
                    <label>Tangential Accel: <span class="value" id="alphaVal">0.0 rad/s˛</span></label>
                    <input type="range" id="alpha" min="-5" max="5" value="0" step="0.1">
                </div>

                <div class="vector-toggle">
                    <label><input type="checkbox" id="showVelocity" checked> Velocity</label>
                    <label><input type="checkbox" id="showAccel" checked> Acceleration</label>
                    <label><input type="checkbox" id="showPosition"> Position</label>
                    <label><input type="checkbox" id="showTrail" checked> Trail</label>
                </div>

                <div class="sim-buttons">
                    <button class="sim-btn primary" id="startBtn">Start</button>
                    <button class="sim-btn secondary" id="resetBtn">Reset</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/obfuscated/physics/circular-motion-inline.js"></script>
    <script src="../js/obfuscated/physics/circular-motion-inline.js"></script>            </body>
</html>
