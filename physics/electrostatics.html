<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrostatics - Pankaj Classes</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .stats-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 1rem;
            margin-top: 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        .stat-item .label { color: var(--text-secondary); }
        .stat-item .val { color: var(--physics-color); font-weight: 600; font-family: 'Courier New', monospace; }
        .toggle-group { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 1rem; }
        .toggle-group label {
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.85rem; color: var(--text-secondary); cursor: pointer;
        }
        .toggle-group input { accent-color: var(--physics-color); }
        .navbar-sim {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-sim .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .navbar-sim .site-logo {
            height: 40px;
            width: auto;
            filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.3));
        }
        .navbar-sim .logo-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .navbar-sim .logo-text h1 {
            font-size: 1.1rem;
            margin: 0;
            background: linear-gradient(135deg, var(--physics-color), var(--primary), var(--chemistry-color), var(--maths-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            line-height: 1.2;
        }
        .navbar-sim .nav-center {
            flex: 1;
            text-align: center;
        }
        .navbar-sim .nav-center h1 {
            font-size: 1.3rem;
            margin: 0;
            background: linear-gradient(135deg, #ffffff, #cccccc, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-sim .back-btn {
            margin: 0;
            padding: 0.5rem 1rem;
            text-align: center;
            flex-shrink: 0;
        }
        .sim-page { padding: 0; height: calc(100vh - 70px); display: flex; flex-direction: column; }
        .sim-container { display: flex; flex: 1; gap: 0; overflow: hidden; }
        .sim-container > div:first-child { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .canvas-wrapper { flex: 1; margin: 1rem; margin-bottom: 0.5rem; border-radius: var(--radius); overflow: hidden; }
        .canvas-wrapper canvas { width: 100%; height: 100%; display: block; }
        .stats-panel { margin: 0 1rem 1rem 1rem; padding: 0.7rem; font-size: 0.8rem; }
        .stats-panel .stat-item { padding: 0.2rem 0; }
        .controls-panel { width: 300px; max-height: none; overflow-y: auto; margin: 1rem 1rem 1rem 0.5rem; padding: 1.2rem; border-radius: var(--radius); }
        .controls-panel h3 { margin-bottom: 1rem; font-size: 1rem; }
        .control-group { margin-bottom: 1rem; }
        .control-group label { font-size: 0.8rem; }
        .control-group input[type="range"] { height: 4px; }
        .control-group input[type="range"]::-webkit-slider-thumb { width: 14px; height: 14px; }
        .info-box { font-size: 0.75rem; margin-top: 1rem; padding: 0.7rem; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5SCFHT9W3K"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-sim">
            <img src="../assets/logo.png" alt="Logo" class="site-logo">

            <div class="logo-text"><h1>Pankaj Classes</h1></div>
            <button class="navbar-back-btn visible" onclick="window.location.href='../index.html#physics'">Back to Subjects</button>
            <div class="nav-center"><h1>Electrostatics</h1></div>
            <button class="back-btn" onclick="window.location.href='../index.html#physics'">Back to Physics</button>
        </nav>
    </header>
    <main class="sim-page">
        <div class="sim-container">
            <div>
                <div class="canvas-wrapper">
                    <canvas id="simCanvas" width="800" height="500"></canvas>
                </div>
                <div class="stats-panel">
                    <div class="stat-item"><span class="label">Field at cursor:</span><span class="val" id="statE">0.00 N/C</span></div>
                    <div class="stat-item"><span class="label">Potential at cursor:</span><span class="val" id="statV">0.00 V</span></div>
                </div>
            </div>

            <div class="controls-panel">
                <h3>Charges</h3>

                <div class="control-group">
                    <label>Charge 1: <span class="value" id="q1Val">+5 \u03bcC</span></label>
                    <input type="range" id="q1" min="-10" max="10" value="5" step="0.5">
                </div>

                <div class="control-group">
                    <label>Charge 2: <span class="value" id="q2Val">-5 \u03bcC</span></label>
                    <input type="range" id="q2" min="-10" max="10" value="-5" step="0.5">
                </div>

                <div class="control-group">
                    <label>Separation: <span class="value" id="sepVal">3.0 m</span></label>
                    <input type="range" id="separation" min="1" max="6" value="3" step="0.5">
                </div>

                <div class="toggle-group">
                    <label><input type="checkbox" id="showField" checked> Field Lines</label>
                    <label><input type="checkbox" id="showEquip" checked> Equipotential</label>
                    <label><input type="checkbox" id="showVector"> Field Vectors</label>
                </div>

                <div class="sim-buttons" style="margin-top:1.5rem">
                    <button class="sim-btn primary" id="addPositive">+ Add Charge</button>
                    <button class="sim-btn secondary" id="resetBtn">Reset</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/obfuscated/physics/electrostatics-inline.js"></script>
    <script src="../js/obfuscated/physics/electrostatics-inline.js"></script>            </body>
</html>
