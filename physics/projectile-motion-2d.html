<!DOCTYPE html>
<html lang="en">
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectile on Inclined Plane - Pankaj Classes</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .stats-panel {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); padding: 1rem; margin-top: 1rem;
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
        }
        .stat-item { display: flex; justify-content: space-between; font-size: 0.85rem; }
        .stat-item .label { color: var(--text-secondary); }
        .stat-item .val { color: var(--physics-color); font-weight: 600; font-family: 'Courier New', monospace; }
        .navbar-sim { display: flex; justify-content: space-between; align-items: center; }
        .navbar-sim .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .navbar-sim .site-logo { height: 40px; width: auto; filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.3)); }
        .navbar-sim .logo-text { display: flex; flex-direction: column; align-items: flex-start; }
        .navbar-sim .logo-text h1 { font-size: 1.1rem; margin: 0; background: linear-gradient(135deg, var(--physics-color), var(--primary), var(--chemistry-color), var(--maths-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 800; line-height: 1.2; }
        .navbar-sim .nav-center { flex: 1; text-align: center; }
        .navbar-sim .nav-center h1 { font-size: 1.3rem; margin: 0; background: linear-gradient(135deg, #ffffff, #cccccc, #fdcb6e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .navbar-sim .back-btn { margin: 0; padding: 0.5rem 1rem; text-align: center; flex-shrink: 0; }
        .sim-page { padding: 0; height: calc(100vh - 70px); display: flex; flex-direction: column; }
        .sim-container { display: flex; flex: 1; gap: 0; overflow: hidden; }
        .sim-container > div:first-child { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .canvas-wrapper { flex: 1; margin: 1rem; margin-bottom: 0.5rem; border-radius: var(--radius); overflow: hidden; }
        .canvas-wrapper canvas { width: 100%; height: 100%; display: block; }
        .stats-panel { margin: 0 1rem 1rem 1rem; padding: 0.7rem; font-size: 0.8rem; }
        .stats-panel .stat-item { padding: 0.2rem 0; }
        .controls-panel { width: 300px; max-height: none; overflow-y: auto; margin: 1rem 1rem 1rem 0.5rem; padding: 1.2rem; border-radius: var(--radius); }
        .controls-panel h3 { margin-bottom: 1rem; font-size: 1rem; }
        .control-group { margin-bottom: 1rem; }
        .control-group label { font-size: 0.8rem; }
        .control-group input[type="range"] { height: 4px; }
        .control-group input[type="range"]::-webkit-slider-thumb { width: 14px; height: 14px; }
        .pause-btn { background: #fdcb6e; color: #000000; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: opacity 0.3s; }
   .pause-btn:hover { opacity: 0.85; }
        .vector-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .vector-toggle input { accent-color: var(--physics-color); }
        .launch-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .launch-toggle input { accent-color: var(--physics-color); }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5SCFHT9W3K"></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-sim">
            <img src="../assets/logo.png" alt="Logo" class="site-logo">

            <div class="logo-text"><h1>Pankaj Classes</h1></div>
            <div class="nav-center"><h1>Projectile on Inclined Plane</h1></div>
            <button class="back-btn" onclick="window.location.href='../index.html#physics'">Back to Physics</button>
        </nav>
    </header>
    <main class="sim-page">
        <div class="sim-container">
            <div>
                <div class="canvas-wrapper"><canvas id="simCanvas" width="800" height="500"></canvas></div>
                <div class="stats-panel">
                    <div class="stat-item"><span class="label">Range on plane:</span><span class="val" id="statRange">0.00 m</span></div>
                    <div class="stat-item"><span class="label">Time of flight:</span><span class="val" id="statTime">0.00 s</span></div>
                    <div class="stat-item"><span class="label">Max height:</span><span class="val" id="statHeight">0.00 m</span></div>
                    <div class="stat-item"><span class="label">Velocity:</span><span class="val" id="statVel">0.00 m/s</span></div>
                    <div class="stat-item"><span class="label">Vx:</span><span class="val" id="statVx">0.00 m/s</span></div>
                    <div class="stat-item"><span class="label">Vy:</span><span class="val" id="statVy">0.00 m/s</span></div>
                </div>
            </div>
            <div class="controls-panel">
                <h3>Controls</h3>
                <div class="control-group"><label>Incline Angle: <span class="value" id="inclineVal">30¯</span></label><input type="range" id="incline" min="5" max="60" value="30" step="1"></div>
                <div class="control-group"><label>Launch Angle: <span class="value" id="launchVal">30¯</span></label><input type="range" id="launch" min="0" max="90" value="30" step="1"></div>
                <div class="control-group"><label>Initial Velocity: <span class="value" id="velVal">40 m/s</span></label><input type="range" id="velocity" min="10" max="80" value="40" step="1"></div>
                <div class="control-group"><label>Gravity: <span class="value" id="gravVal">9.8 m/sý</span></label><input type="range" id="gravity" min="1" max="20" value="9.8" step="0.1"></div>
                <div class="launch-toggle">
                    <input type="checkbox" id="launchFromTop">
                    <label for="launchFromTop">Launch from Top (downward)</label>
                </div>
                <div class="vector-toggle">
                    <input type="checkbox" id="showVectors" checked>
                    <label for="showVectors">Show velocity vectors</label>
                </div>
                <div class="sim-buttons" style="margin-top: 1rem;">
                    <button class="sim-btn primary" id="launchBtn">Launch</button>
                    <button class="pause-btn" id="pauseBtn" style="display:none;">Pause</button>
                    <button class="sim-btn secondary" id="resetBtn">Reset</button>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/obfuscated/physics/projectile-motion-2d-inline.js"></script>
    <script src="../js/obfuscated/physics/projectile-motion-2d-inline.js"></script>            </body>
</html>
